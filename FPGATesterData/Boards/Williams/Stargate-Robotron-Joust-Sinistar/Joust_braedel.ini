[NOTES]
If you are going to use the auto ROM signatures, be sure to select your type of ROM (2532 or 2732) on the board config screen.  If the jumpers closest to ROM 5 and 6 are installed, you have 2732s.


Also the newer versions of the tester will auto-disable the watchdog but be aware that this won't work for signature analysis when the tester is driving the address lines with the counter.















